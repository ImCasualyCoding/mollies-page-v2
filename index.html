<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
    <title>MoveRx | Precision Mobility & Rehab with Mollie</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="MoveRx blends movement science with clinical corrective exercise and post-rehab expertise. Mollie delivers safe, evidence-based training for precise functional recovery in South Florida.">
    
    <!-- Open Graph (OG) Social Sharing Previews (iMessage, Slack, Facebook, etc.) -->
    <meta property="og:title" content="MoveRx | Precision Mobility & Rehab with Mollie">
    <meta property="og:description" content="MoveRx blends movement science with clinical corrective exercise and post-rehab expertise. Safe, evidence-based training for precise functional recovery.">
    <meta property="og:image" content="assets/images/hero/mollies%20brother.jpg">
    <meta property="og:type" content="website">
    <meta property="og:image:type" content="image/jpeg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="900">
    
    <!-- Twitter Sharing Previews -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="MoveRx | Precision Mobility & Rehab with Mollie">
    <meta name="twitter:description" content="MoveRx blends movement science with clinical corrective exercise and post-rehab expertise. Safe, evidence-based training for precise functional recovery.">
    <meta name="twitter:image" content="assets/images/hero/mollies%20brother.jpg">
    
    <!-- Google Fonts: Playfair Display (Elegant Serif) & Outfit (Crisp Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
    
    <!-- CSS Design Tokens and Styles -->
    <link rel="stylesheet" href="assets/css/variables.css?v=2.0.6">
    <link rel="stylesheet" href="assets/css/main.css?v=2.0.6">

</head>
<body>

    <!-- Preloader Loading Screen -->
    <div id="preloader" class="preloader-overlay">
        <div class="loader">
            <span class="m char-move">M</span>
            <span class="o char-move">o</span>
            <span class="v char-move">v</span>
            <span class="e char-move">e</span>
            <span class="r char-rx">R</span>
            <span class="x char-rx">x</span>
        </div>
    </div>

    <!-- Scroll-Animated Leaves (Injected via JS) -->
    <div id="leaves-mount"></div>

    <!-- Sticky Navigation Bar (Injected via JS) -->
    <header class="nav-container animate-fade-in" id="nav-header">
        <!-- Dynamic Navigation Pill Injected Here -->
    </header>

    <!-- Dynamic Sections Mount -->
    <main id="main-content">
        <!-- Hero Section, success stories, and footer will be rendered here via JS -->
    </main>

    <!-- INTERACTIVE VERIFICATION DETAIL MODAL -->
    <div id="cert-modal" class="modal-overlay">
        <div class="modal-box">
            <button id="modal-close" class="modal-close-btn" aria-label="Close window">&times;</button>
            <span class="pill-badge" style="background-color: var(--sun-accent); color: var(--text-primary); margin-bottom: 12px; font-size: 10px; font-weight: 700; box-shadow: none;">Verified Board Credential</span>
            <h3 id="m-title" class="modal-title">Certificate Title</h3>
            <div id="m-org" class="modal-org">Official Document Scan</div>
            
            <div class="modal-display-frame">
                <!-- Full-resolution Document Image -->
                <div id="modal-media-wrapper" style="width: 100%; height: 100%; position: relative; display: flex; align-items: center; justify-content: center; min-height: 360px;">
                    <!-- Image renders here -->
                </div>
            </div>

            <!-- Modal Dynamic Interactivity Controls -->
            <div id="modal-controls-row" style="margin-top: 16px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;">
                <!-- Left: Pagination -->
                <div id="modal-pagination" style="display: flex; align-items: center; gap: 8px;"></div>
                <!-- Right: Download Link -->
                <div id="modal-download-container"></div>
            </div>
        </div>
    </div>

    <!-- Main Logic and Content Script -->
    <script src="assets/js/main.js?v=2.0.6"></script>
</body>
</html>
