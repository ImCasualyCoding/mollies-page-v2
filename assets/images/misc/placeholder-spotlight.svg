<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="100%" height="100%">
    <!-- Base Background Gradient matching tropical theme -->
    <defs>
        <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0d453c" />
            <stop offset="100%" stop-color="#125b50" />
        </linearGradient>
        <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f5d061" />
            <stop offset="100%" stop-color="#e5b05c" />
        </linearGradient>
    </defs>
    
    <rect width="100%" height="100%" fill="url(#bgGradient)" />
    
    <!-- Abstract Tropical Leaves Art in Background -->
    <path d="M400,100 Q320,150 250,80 Q290,200 400,220 Z" fill="rgba(24, 154, 134, 0.15)" />
    <path d="M400,200 Q300,280 200,200 Q260,320 400,340 Z" fill="rgba(24, 154, 134, 0.15)" />
    <path d="M0,400 Q80,350 150,420 Q110,300 0,280 Z" fill="rgba(24, 154, 134, 0.15)" />
    
    <!-- Central Spotlight Graphic -->
    <circle cx="200" cy="220" r="75" fill="none" stroke="url(#goldGradient)" stroke-width="3" stroke-dasharray="10 6" />
    <circle cx="200" cy="220" r="60" fill="rgba(255, 255, 255, 0.03)" />
    
    <!-- Camera/Photo Icon -->
    <path d="M175,210 L183,210 L187,203 Q189,200 192,200 L208,200 Q211,200 213,203 L217,210 L225,210 Q230,210 230,215 L230,240 Q230,245 225,245 L175,245 Q170,245 170,240 L170,215 Q170,210 175,210 Z" fill="none" stroke="url(#goldGradient)" stroke-width="4.5" stroke-linejoin="round" />
    <circle cx="200" cy="228" r="12" fill="none" stroke="url(#goldGradient)" stroke-width="4" />
    
    <!-- Text Labels -->
    <text x="200" y="340" fill="#f8f6f0" font-family="'Outfit', sans-serif" font-size="20" font-weight="700" text-anchor="middle" letter-spacing="1.5">SPOTLIGHT IMAGE</text>
    <text x="200" y="370" fill="rgba(248, 246, 240, 0.6)" font-family="'Outfit', sans-serif" font-size="14" font-weight="600" text-anchor="middle" letter-spacing="1">PHOTO COMING SOON</text>
</svg>
